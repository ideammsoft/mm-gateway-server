#Config Server 찾기
#Config 서버를 통해 정보를 가져오기
spring:
  config:
    import: "optional:configserver:http://localhost:1881"

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-minutes: 15
    refresh-token-minutes: 20160 #14일

my:
  logging:
    level: debug

logging:
  level:
    root: info
    # root와 같은 세로 라인에 있어야 합니다.
    org.springframework.cloud.gateway: ${my.logging.level}
    co.kr.mmsoft.shopgatewayserver: ${my.logging.level}